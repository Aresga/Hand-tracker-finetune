# YOLO hyperparameters for hand pose fine-tuning
# Reference: https://docs.ultralytics.com/usage/cfg/

# ── Training ────────────────────────────────────────────────────────────────
epochs:        100
patience:      20          # early stopping — stop if no improvement for N epochs
batch:         16
imgsz:         640
workers:       8

# ── Optimiser ───────────────────────────────────────────────────────────────
optimizer:     AdamW
lr0:           0.001        # initial learning rate
lrf:           0.01         # final lr = lr0 * lrf
momentum:      0.937
weight_decay:  0.0005
warmup_epochs: 3
warmup_bias_lr: 0.1

# ── Augmentation ────────────────────────────────────────────────────────────
hsv_h:         0.015
hsv_s:         0.7
hsv_v:         0.4
degrees:       10.0         # rotation — keep low for hand pose
translate:     0.1
scale:         0.5
shear:         0.0
perspective:   0.0
flipud:        0.0          # vertical flip — disable for hand pose
fliplr:        0.5          # horizontal flip — OK for hand detection
mosaic:        1.0
mixup:         0.1
copy_paste:    0.0

# ── Loss weights ────────────────────────────────────────────────────────────
box:           7.5
cls:           0.5
dfl:           1.5
pose:          12.0         # keypoint regression loss weight — higher = tighter joints
kobj:          2.0          # keypoint objectness loss weight

# ── Output ──────────────────────────────────────────────────────────────────
project:       runs/train
name:          hand_pose
save:          true
save_period:   10           # save checkpoint every N epochs
plots:         true
